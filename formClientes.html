<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComercioTech - Clientes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo">CT</div>
        <div>
          <h1>ComercioTech</h1>
          <div class="subtitle">Administra clientes rápida y fácilmente</div>
        </div>
      </div>
      <div class="chip">API /clientes</div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Crear cliente</h3>
        <form id="formClientes">
          <div class="form-row">
            <label>Nombre</label>
            <input id="nombre" name="nombre" type="text" placeholder="Ej: Ana Perez" required>
          </div>
          <div class="form-row">
            <label>Email</label>
            <input id="email" name="email" type="email" placeholder="ejemplo@dominio.com" required>
          </div>
          <div class="form-row">
            <label>Dirección</label>
            <input id="direccion" name="direccion" type="text" placeholder="Calle, número, ciudad">
          </div>
          <div class="form-row">
            <label>Teléfono</label>
            <input id="telefono" name="telefono" type="text" placeholder="+56912345678">
          </div>
          <div class="form-actions">
            <button type="submit">Crear cliente</button>
            <button type="button" class="secondary" onclick="document.getElementById('formClientes').reset()">Limpiar</button>
            <div id="msg" class="msg"></div>
          </div>
        </form>
      </div>

      <div class="card">
        <div class="list-header">
          <h3>Clientes</h3>
          <div class="search">
            <input id="search" placeholder="Buscar por nombre o email" oninput="(function(){const q=this.value.toLowerCase();document.querySelectorAll('.client-item').forEach(it=>{const text=it.innerText.toLowerCase();it.style.display=text.includes(q)?'flex':'none'})}).call(this)">
          </div>
        </div>
        <div id="clients"></div>
        <div class="footer">Interfaz simple — crea, edita o elimina clientes</div>
      </div>
    </div>

  </div>
  <script src="/components/volverInicio.js"></script>
  <script src="/app.js"></script>
</body>
</html>
